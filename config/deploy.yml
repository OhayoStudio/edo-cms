# Kamal deploy config. Each fork of this template should:
#   1. Set `service` and `image` to its own project name / registry image.
#   2. Replace the `hosts` and `proxy.host` with its production host.
#   3. Set `volumes` to a project-specific path on the host.
#   4. Fill secrets via Kamal's secret manager (`kamal secrets push`) or
#      via the deployer host's environment.
#
# See https://kamal-deploy.org for full reference.

service: edo-cms
image: your-registry/edo-cms

servers:
  web:
    hosts:
      - <%= ENV.fetch("DEPLOY_HOST", "your.production.host") %>
    options:
      add-host: host.docker.internal:host-gateway

proxy:
  ssl: true
  host: <%= ENV.fetch("APPLICATION_HOST", "your-domain.example") %>

registry:
  server: ghcr.io
  username: your-github-user
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: amd64

env:
  clear:
    RAILS_LOG_TO_STDOUT: "true"
    SOLID_QUEUE_IN_PUMA: true
    DB_HOST: host.docker.internal
    APPLICATION_HOST: <%= ENV.fetch("APPLICATION_HOST", "your-domain.example") %>
    ACTIVE_STORAGE_SERVICE: gcs_production
    GCS_BUCKET: <%= ENV.fetch("GCS_BUCKET", "your-bucket-name") %>
    GCS_CREDENTIALS_PATH: /tmp/gcs_credentials.json
  secret:
    - RAILS_MASTER_KEY
    - SENTRY_DSN
    - EDO_CMS_DATABASE_PASSWORD
    - YOUTUBE_API_KEY

volumes:
  - /var/www/edo-cms-production/storage:/rails/storage

asset_path: /rails/public/assets

ssh:
  user: deploy

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole"
