# Kamal deploy config. Each fork of this template should:
#   1. Set `service` and `image` to its own project name / registry image.
#   2. Replace the `hosts` and `proxy.host` with its production host.
#   3. Set `volumes` to a project-specific path on the host.
#   4. Fill secrets via Kamal's secret manager (`kamal secrets push`) or
#      via the deployer host's environment.
#
# See https://kamal-deploy.org for full reference.

service: edo-cms
image: your-registry/edo-cms

servers:
  web:
    hosts:
      - <%= ENV.fetch("DEPLOY_HOST", "your.production.host") %>
    options:
      add-host: host.docker.internal:host-gateway

proxy:
  ssl: true
  # Apex only by default. To also serve www, point a `www` CNAME at the apex
  # (so it resolves to this host for Let's Encrypt's HTTP-01 challenge) and use:
  #   host: <%%= h = ENV.fetch("APPLICATION_HOST", "your-domain.example"); "#{h},www.#{h}" %>
  # Don't add www without the CNAME — a failed challenge for one SAN fails the
  # whole cert and leaves the site without TLS.
  host: <%= ENV.fetch("APPLICATION_HOST", "your-domain.example") %>

registry:
  server: ghcr.io
  username: your-github-user
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: amd64

env:
  clear:
    RAILS_LOG_TO_STDOUT: "true"
    SOLID_QUEUE_IN_PUMA: true
    DB_HOST: host.docker.internal
    APPLICATION_HOST: <%= ENV.fetch("APPLICATION_HOST", "your-domain.example") %>
    ACTIVE_STORAGE_SERVICE: gcs_production
    GCS_BUCKET: <%= ENV.fetch("GCS_BUCKET", "your-bucket-name") %>
    GCS_CREDENTIALS_PATH: /tmp/gcs_credentials.json
  secret:
    - RAILS_MASTER_KEY
    - SENTRY_DSN
    - EDO_CMS_DATABASE_PASSWORD
    - YOUTUBE_API_KEY

volumes:
  - /var/www/edo-cms-production/storage:/rails/storage

asset_path: /rails/public/assets

# Self-hosted Umami analytics. Two accessories: a dedicated Postgres for
# Umami's events, and the Umami app itself routed through Kamal's proxy on
# a subdomain (e.g. analytics.example.com).
#
# Required deploy-host env vars:
#   UMAMI_HOST            e.g. analytics.example.com (matches Setting "Analytics host")
#   UMAMI_DB_PASSWORD     password for the umami postgres role
#   UMAMI_APP_SECRET      Umami's session secret (32+ random chars)
#
# After first `bin/kamal deploy`, open https://$UMAMI_HOST and log in with
# the default admin user (admin / umami), change the password, create a
# website, and paste its website-id + host into /admin/settings.
#
# Guarded so the block only renders when Umami is configured. Without this,
# an unset UMAMI_DB_PASSWORD makes POSTGRES_PASSWORD render empty, YAML reads
# it as nil, and `kamal setup`/`config` fails with
# "accessories/umami-db/env/clear/POSTGRES_PASSWORD: should be a string".
<% if ENV["UMAMI_DB_PASSWORD"].to_s != "" %>
accessories:
  umami-db:
    image: postgres:15
    host: <%= ENV.fetch("DEPLOY_HOST", "your.production.host") %>
    env:
      clear:
        POSTGRES_DB: umami
        POSTGRES_USER: umami
        POSTGRES_PASSWORD: <%= ENV.fetch("UMAMI_DB_PASSWORD", "") %>
    directories:
      - umami-db-data:/var/lib/postgresql/data

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    host: <%= ENV.fetch("DEPLOY_HOST", "your.production.host") %>
    port: 3000
    proxy:
      ssl: true
      host: <%= ENV.fetch("UMAMI_HOST", "analytics.your-domain.example") %>
      app_port: 3000
    env:
      clear:
        DATABASE_TYPE: postgresql
        DATABASE_URL: postgresql://umami:<%= ENV.fetch("UMAMI_DB_PASSWORD", "") %>@edo-cms-umami-db:5432/umami
        APP_SECRET: <%= ENV.fetch("UMAMI_APP_SECRET", "") %>
<% end %>

ssh:
  user: deploy

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole"
