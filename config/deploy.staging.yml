service: edo-staging
image: ohayostudio/edo

servers:
  web:
    hosts:
      - 152.42.197.168
    options:
      add-host: host.docker.internal:host-gateway

proxy:
  ssl: true
  host: stg.example.com

registry:
  server: ghcr.io
  username: ohayostudio
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: amd64
  remote: ssh://root@152.42.197.168

env:
  clear:
    RAILS_LOG_TO_STDOUT: "true"
    SOLID_QUEUE_IN_PUMA: true
    DB_HOST: host.docker.internal
    APPLICATION_HOST: stg.example.com
    ACTIVE_STORAGE_SERVICE: gcs_staging
    GCS_BUCKET: edo-cms-staging
  secret:
    - RAILS_MASTER_KEY
    - EDO_DATABASE_PASSWORD
    - ANTHROPIC_API_KEY
    - INSTAGRAM_ACCESS_TOKEN
    - INSTAGRAM_USER_ID
    - FLICKR_API_KEY
    - FLICKR_API_SECRET
    - FLICKR_ACCESS_TOKEN
    - FLICKR_ACCESS_TOKEN_SECRET
    - FLICKR_USER_NSID
    - YOUTUBE_API_KEY
    - GOOGLE_CLIENT_ID
    - GOOGLE_CLIENT_SECRET
    - GOOGLE_API_KEY
    - GEMINI_API_KEY
    - PEXELS_API_KEY

volumes:
  - /var/www/edo-staging/storage:/rails/storage

asset_path: /rails/public/assets

ssh:
  user: deploy

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole"
