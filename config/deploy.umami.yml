# Umami analytics is deployed via Docker Compose on the production server,
# NOT via Kamal. Kamal cannot deploy pre-built third-party images without
# trying to rebuild and push them.
#
# Deployment is managed directly on 167.99.120.27:
#   /opt/umami/docker-compose.yml
#
# The Umami app container is connected to the `kamal` Docker network so
# kamal-proxy can route analytics.sepiabraun.com to it:
#   docker network connect kamal umami-app-1
#
# kamal-proxy registration (run once after container is up):
#   docker exec kamal-proxy kamal-proxy deploy umami \
#     --target=umami-app-1:3000 \
#     --host=analytics.sepiabraun.com \
#     --health-check-path=/
#
# To restart Umami: ssh deploy@167.99.120.27
#   cd /opt/umami && docker compose up -d
