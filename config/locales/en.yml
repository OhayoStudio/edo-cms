# Top-level English keys.
# View-scoped strings live under config/locales/views/, shared chrome
# (nav, footer, meta) under config/locales/shared/. Add a new locale by:
#   1. Creating a sibling <code>config/locales/<locale>.yml</code>
#   2. Appending it to config.i18n.available_locales in application.rb
#   3. Extending the regex on the locale: scope in config/routes.rb
en:
  locale_name: English
  locale_name_short: EN

  date:
    formats:
      short_month: "%d %b %Y"   # "01 Apr 2026"
      long_month:  "%B %d, %Y"  # "April 01, 2026"
  time:
    formats:
      short_month: "%d %b %Y"
      long_month:  "%B %d, %Y"

  views:
    pagination:
      first: "« First"
      last: "Last »"
      previous: "‹ Prev"
      next: "Next ›"
      truncate: "…"
