# Local Umami stack for testing analytics against the dev server.
#
#   docker compose -f docker-compose.umami.yml up -d
#   open http://localhost:3006        # log in as admin / umami, change pw,
#                                     # create a website, copy the Website ID
#
# Then in /admin/settings → Analytics:
#   Enable Umami:    checked
#   Website ID:      (paste from Umami dashboard)
#   Analytics host:  localhost:3006
#
# The helper picks `http` automatically for localhost hosts.
# Data persists in the `umami-db-data` named volume.

services:
  umami-db:
    image: postgres:15
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: umami
    volumes:
      - umami-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami"]
      interval: 5s
      timeout: 5s
      retries: 10

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    ports:
      - "3006:3000"
    environment:
      DATABASE_TYPE: postgresql
      DATABASE_URL: postgresql://umami:umami@umami-db:5432/umami
      APP_SECRET: dev-only-not-secret-change-in-prod
    depends_on:
      umami-db:
        condition: service_healthy

volumes:
  umami-db-data:
