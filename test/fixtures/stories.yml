# Read about fixtures at https://api.rubyonrails.org/classes/ActiveRecord/FixtureSet.html

# Story for an Article
story_for_article_published_tech:
  storyable: article_published_tech (Article) # Points to article_published_tech in articles.yml
  slug: "story-for-article-published-tech"    # Static slug
  is_published: true
  published_at: '2023-01-15 10:00:00'      # Static past date for published story
  is_top: true                                # Static boolean
  # created_at and updated_at will be set automatically

# Story for another Article (draft)
story_for_article_draft_lifestyle:
  storyable: article_draft_lifestyle (Article) # Points to article_draft_lifestyle in articles.yml
  slug: "story-for-article-draft-lifestyle"
  is_published: false # Reflects draft status
  published_at: nil   # Drafts don't have a published_at
  is_top: false

# Story for a Video
story_for_video_intro_rails:
  storyable: video_intro_rails (Video) # Points to video_intro_rails in videos.yml
  slug: "story-for-video-intro-rails"    # Static slug
  is_published: true # Assuming videos are typically published upon creation for stories
  published_at: '2023-02-10 12:00:00'      # Example static published date
  is_top: true                                # Example: make this a top story

# Story for another Video
story_for_video_api_design:
  storyable: video_api_design (Video)
  slug: "story-for-video-api-design"
  is_published: true
  published_at: '2023-02-20 14:30:00'
  is_top: false

# Story that is not published but has a future published_at (scheduled)
story_scheduled_article:
  storyable: article_review_general (Article) # Assuming this article is in 'review' or 'draft'
  slug: "story-for-article-review-general-scheduled"
  is_published: false # Not yet published
  published_at: <%= Time.current + 7.days %> # Scheduled to be published in the future (ERB for Time.current is fine)
  is_top: false

# Story that might be a top story but associated with an archived article (edge case)
# Depending on logic, this might or might not be displayed. Fixture helps test this.
story_for_archived_article_as_top:
  storyable: article_archived_tech (Article)
  slug: "story-for-article-archived-tech-top"
  is_published: true # It was published before being archived
  published_at: '2022-10-01 09:00:00'      # Static past date representing when it was published
  is_top: true                                # Marked as top, but storyable is archived. Controller logic will determine visibility.
