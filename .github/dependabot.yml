version: 2
updates:
- package-ecosystem: bundler
  directory: "/"
  schedule:
    interval: weekly
  open-pull-requests-limit: 5
  groups:
    bundler-non-major:
      update-types: [ "patch", "minor" ]
- package-ecosystem: github-actions
  directory: "/"
  schedule:
    interval: weekly
  open-pull-requests-limit: 5
  groups:
    actions-non-major:
      update-types: [ "patch", "minor" ]
- package-ecosystem: docker
  directory: "/"
  schedule:
    interval: weekly
  open-pull-requests-limit: 3
