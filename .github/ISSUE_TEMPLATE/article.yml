name: "📝 Article"
description: "Track an article from idea to publication"
title: "[Article] "
labels: ["article"]
body:
  - type: input
    id: category
    attributes:
      label: Category
      description: "Which category does this article belong to? (matches a Category record in the CMS)"
      placeholder: "e.g. Stories, Reviews, Field Notes"
    validations:
      required: false

  - type: input
    id: month
    attributes:
      label: Scheduled Month
      description: "When is this scheduled for?"
      placeholder: "e.g. April 2027"
    validations:
      required: false

  - type: textarea
    id: brief
    attributes:
      label: Article Brief
      description: "Key angle, sources, tone, or notes for this piece"
      placeholder: |
        - Main angle:
        - Key sources/references:
        - Tone/approach:
        - Notes:
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Progress Checklist
      description: Track article progress
      options:
        - label: Research completed
        - label: Images sourced
        - label: First draft written
        - label: Draft reviewed/edited
        - label: Final HTML ready for CMS
        - label: Published
